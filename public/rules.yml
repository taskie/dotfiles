'distribute/.bashrc':
  dirs: ['sh.d', 'bash.d']
  pat: '\.(?:ba)?sh$'

'distribute/.gdbinit':
  dir: 'etc'
  pat: '^gdbinit(_.+)?$'

'distribute/.config/git/config':
  dir: 'git/config.d'
  pat: '\.conf$'

'distribute/.config/git/ignore':
  dir: 'git/ignore.d'
  pat: '\.gitignore$'

'distribute/.gvimrc':
  dir: 'etc'
  pat: '^gvimrc(_.+)?$'

'distribute/.minttyrc':
  dir: 'etc'
  pat: '^minttyrc(_.+)?$'

'distribute/.nanorc':
  dir: 'etc'
  pat: '^nanorc(_.+)$'

'distribute/.npmrc':
  dir: 'etc'
  pat: '^npmrc(_.+)?'

'distribute/.screenrc':
  dir: 'etc'
  pat: '^screenrc(_.+)?'

'distribute/.ssh/config':
  dir: 'ssh.config.d'
  pat: '\.conf$'

'distribute/.tmux.conf':
  dir: 'tmux.d'
  pat: '\.conf$'

'distribute/.vimrc':
  dir: 'vim.d'
  pat: '\.vim$'

'distribute/.zshrc':
  dirs: ['sh.d', 'zsh.d']
  pat: '\.z?sh$'

'distribute/.xstow.ini':
  dir: 'etc'
  pat: '^xstow(_.+?)?.ini$'

'distribute/.emacs.d/init.el':
  dir: 'emacs.d/init.d'
  pat: '\.el$'

'distribute/.config/glow/glow.yml':
  dir: 'etc'
  pat: '^glow(_.+)?\.yml$'

'distribute/.local/bin/goxb':
  dir: 'bin'
  pat: '^goxb_go$'
  mode: 755

'distribute/.local/bin/brug':
  dir: 'bin'
  pat: '^brug_mac$'
  mode: 755

'distribute/.local/bin/csvutil':
  dir: 'bin'
  pat: '^csvutil$'
  mode: 755

'distribute/.local/bin/findup':
  dir: 'bin'
  pat: '^findup$'
  mode: 755

'distribute/.local/bin/git-wta':
  dir: 'bin'
  pat: '^git-wta$'
  mode: 755

'distribute/.local/bin/lpsql':
  dir: 'bin'
  pat: '^lpsql$'
  mode: 755

'distribute/.local/bin/lpsqld':
  dir: 'bin'
  pat: '^lpsqld$'
  mode: 755

'distribute/.local/bin/makeup':
  dir: 'bin'
  pat: '^makeup$'
  mode: 755

'distribute/.local/bin/rgdiff':
  dir: 'bin'
  pat: '^rgdiff(_.+)?$'
  mode: 755

'distribute/.local/bin/pbcopy':
  dir: 'bin'
  pat: '^pbcopy_wsl$'
  mode: 755

'distribute/.local/bin/pbpaste':
  dir: 'bin'
  pat: '^pbpaste_wsl$'
  mode: 755

'distribute/.local/bin/nativeenv':
  dir: 'bin'
  pat: '^nativeenv$'
  mode: 755

'distribute/.local/bin/nargo':
  dir: 'bin'
  pat: '^nargo$'
  mode: 755

'distribute/.local/bin/winopen':
  dir: 'bin'
  pat: '^winopen_wsl$'
  mode: 755

'distribute/.local/share/applications/winopen.desktop':
  dir: 'etc/share/applications'
  pat: '^winopen[^.]+.desktop$'

'distribute/.local/share/mimeapps.list.new':
  dir: 'etc/share'
  pat: '^mimeapps[^.]+.list$'

'distribute/.config/wezterm/wezterm.lua':
  dir: 'etc'
  pat: '^wezterm(_[^.]+)?\.lua$'
